[colors]
background = #32302f
background-alt = #373B41
foreground = #C5C8C6
primary = #cc241d 
secondary = #ebdbb2
alert = #A54242
disabled = #707880

[bar/top]
inherit = bar/bar
bottom = false
monitor = DP-3

[bar/bottom]
inherit = bar/bar
bottom = false
monitor = HDMI-1

[bar/bar]
width = 100%
height = 24pt
radius = 6

background = ${colors.background}
foreground = ${colors.foreground}

line-size = 3pt

border-size = 4pt
border-color = #00000000

padding-left = 0
padding-right = 1

module-margin = 1

separator = 
separator-foreground = ${colors.disabled}

font-0 = "JetBrainsMono Nerd Font:style=Bold:size=10;2"

modules-left = xworkspaces xwindow
modules-right = filesystem pulseaudio memory cpu wlan scan date

cursor-click = pointer
cursor-scroll = ns-resize

enable-ipc = true

[module/systray]
type = internal/tray

format-margin = 8pt
tray-spacing = 16pt

[module/xworkspaces]
type = internal/xworkspaces

pin-workspaces = true

label-active = %name%
label-active-background = ${colors.background-alt}
label-active-underline= ${colors.primary}
label-active-padding = 1

label-occupied = %name%
label-occupied-padding = 1

label-urgent = %name%
label-urgent-background = ${colors.alert}
label-urgent-padding = 1

label-empty = %name%
label-empty-foreground = ${colors.disabled}
label-empty-padding = 1

[module/xwindow]
type = internal/xwindow
label = %title:0:60:...%

[module/filesystem]
type = internal/fs
interval = 25

mount-0 = /

label-mounted = %{F#98971a}%mountpoint%%{F-} %percentage_used%%

label-unmounted = %mountpoint% not mounted
label-unmounted-foreground = ${colors.disabled}

[module/pulseaudio]
type = internal/pulseaudio

format-volume-prefix = "VOL "
format-volume-prefix-foreground = ${colors.primary}
format-volume = <label-volume>

label-volume = %percentage%%

label-muted = muted
label-muted-foreground = ${colors.disabled}

[module/memory]
type = internal/memory
interval = 2
format-prefix = "RAM "
format-prefix-foreground = ${colors.primary}
label = %percentage_used:2%%

[module/cpu]
type = internal/cpu
interval = 2
format-prefix = "CPU "
format-prefix-foreground = ${colors.primary}
label = %percentage:2%%

[network-base]
type = internal/network
interval = 5
format-connected = <label-connected>
format-disconnected = <label-disconnected>
label-disconnected = %{F#A54242}%ifname%%{F#707880} disconnected

[module/wlan]
inherit = network-base
interface-type = wireless
label-connected = %{F#458588}%ifname%%{F-} %essid% %local_ip%

[module/eth]
inherit = network-base
interface-type = wired
label-connected = %{F#b16286}%ifname%%{F-} %local_ip%

[module/scan]
type = custom/menu
expand-right = true

label-open = 📠
label-open-foreground = ${colors.primary}
label-close = ✕
label-close-foreground = ${colors.alert}
label-separator = |
label-separator-foreground = ${colors.disabled}

; Two options: Start Scan runs the C++ scan-master binary,
; Learn Vendor opens a YAD dialog to teach from a PDF file.
menu-0-0 = Start Scan
menu-0-0-exec = bash -c '~/.config/scripts/scan-master-cpp/scan-master > /tmp/scan-ui-last.log 2>&1; PAGES=$(grep -c "→" /tmp/scan-ui-last.log 2>/dev/null || echo 0); yad --center --width=300 --height=100 --title="Scan Complete" --text="Processed $PAGE(s)." --button="OK!gtk-ok:0" --borders=10 2>/dev/null' &
menu-0-1 = Learn Vendor
menu-0-1-exec = bash -c 'INPUT=$(yad --center --width=400 --height=150 --title="Learn Vendor" --text="Teach Scan Master from a PDF.\n\nEnter filename (from SCANS folder) and vendor name:" --form --field="Filename" --field="Vendor Name" --button="Learn!gtk-ok:0" --button="Cancel!gtk-cancel:1" --borders=10 2>/dev/null); if [ $? -eq 0 ] && [ -n "$INPUT" ]; then FILE=$(echo "$INPUT" | cut -d"|" -f1); VENDOR=$(echo "$INPUT" | cut -d"|" -f2); ~/.config/scripts/scan-master-cpp/scan-learn "$FILE" "$VENDOR"; fi' &

[module/date]
type = internal/date
interval = 1

date = %H:%M
date-alt = %Y-%m-%d %H:%M:%S

label = %date%
label-foreground = ${colors.primary}

[settings]
screenchange-reload = true
pseudo-transparency = true

; vim:ft=dosini
